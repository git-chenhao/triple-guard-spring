server:
  port: 8080

spring:
  application:
    name: triple-guard-spring

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:tripleguard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2 控制台（开发环境使用）
  h2:
    console:
      enabled: true
      path: /h2-console

# 告警平台配置
alert:
  # 聚合配置
  aggregation:
    enabled: true
    time-window-seconds: 300  # 5分钟聚合窗口
    max-batch-size: 100       # 单批次最大告警数
    group-by-labels:
      - alertname
      - severity
      - source

  # 去重配置
  deduplication:
    enabled: true
    time-window-seconds: 3600  # 1小时去重窗口

  # 通知配置
  notification:
    enabled: true
    delay-seconds: 30          # 批次创建后30秒发送通知
    retry-count: 3
    retry-interval-seconds: 60

  # Agent分析配置
  agent:
    enabled: false             # 默认关闭，需要配置后启用
    scheduler-url: http://localhost:8000/api/v1/schedule
    timeout-seconds: 300
    max-retries: 3

# 日志配置
logging:
  level:
    root: INFO
    com.chenhao.tripleguard: DEBUG
