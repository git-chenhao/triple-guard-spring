server:
  port: 8080

spring:
  application:
    name: triple-guard-spring

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:tripleguard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2 控制台（开发环境使用）
  h2:
    console:
      enabled: true
      path: /h2-console

# 日志配置
logging:
  level:
    root: INFO
    com.chenhao.tripleguard: DEBUG
